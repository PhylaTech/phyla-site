name: Refresh Impact Data

on:
  schedule:
    # Daily at 6:07 AM UTC (off-minute to avoid load spikes)
    - cron: '7 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Fetch latest citation data from OpenAlex
        run: pixi run fetch-impact

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/impact-data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/impact-data.json
          git commit -m "chore: refresh impact data from OpenAlex [automated]"
          git push
