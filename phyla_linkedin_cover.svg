<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" role="img" aria-label="Phyla Technologies, MLOps for Life Sciences">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;700&amp;family=Schibsted+Grotesk:wght@400&amp;display=swap');
      .wm { font-family:'Familjen Grotesk','Helvetica Neue',system-ui,sans-serif; }
      .vo { font-family:'Schibsted Grotesk','Helvetica Neue',system-ui,sans-serif; }</style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f4efe7" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#211910"/>
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Company name, centered (original positions/sizes; reversed color + Familjen) -->
  <text class="wm" x="792" y="185" text-anchor="middle" font-size="120" font-weight="700" letter-spacing="-3" fill="#f4efe7">phyla</text>

  <!-- Subname -->
  <text class="wm" x="792" y="248" text-anchor="middle" font-size="32" font-weight="400" letter-spacing="12" fill="#c9bfae">TECHNOLOGIES</text>

  <!-- Tagline -->
  <text class="vo" x="792" y="300" text-anchor="middle" font-size="20" font-weight="400" letter-spacing="1" fill="#b47825">MLOps for Life Sciences</text>
</svg>
